<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>dooo0t？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f0ece4;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.header{background:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;z-index:10;border-bottom:1px solid #e8e4dc;gap:8px}
.header h1{font-size:16px;font-weight:600;color:#1a1a1a;white-space:nowrap;flex-shrink:0}
.mode-sw{display:flex;background:#f0ece4;border-radius:20px;padding:3px;gap:2px;flex-shrink:0}
.mode-btn{border:none;background:transparent;font-size:12px;padding:5px 9px;border-radius:16px;cursor:pointer;font-family:inherit;color:#888;white-space:nowrap;transition:all .18s}
.mode-btn.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.hbtns{display:flex;gap:6px;flex-shrink:0}
.lbl-btn,.btn{border:1.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;padding:6px 13px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;user-select:none}
.lbl-btn:active,.btn:active{background:#f5f5f5}
.lbl-btn input[type=file]{display:none}

/* ─── Canvas area ─── */
.canvas-area{flex:1;background:#e8e3d8;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
canvas#mc{display:block;max-width:100%;max-height:100%;pointer-events:none}
.hint{position:absolute;border:2px dashed #bbb;border-radius:16px;padding:24px 40px;color:#aaa;font-size:15px;pointer-events:none;text-align:center}

/* ─── Panel ─── */
.panel{background:#fff;border-top:1px solid #e8e4dc;overflow-y:auto;max-height:44vh}
.mpanel{display:none}
.mpanel.active{display:block}

/* ─── Tabs ─── */
.tabs{display:flex;border-bottom:1px solid #eee;padding:0 12px;background:#fff;position:sticky;top:0;z-index:5;overflow-x:auto}
.tab{padding:11px 13px;font-size:14px;color:#999;cursor:pointer;position:relative;border:none;background:none;font-family:inherit;white-space:nowrap}
.tab.active{color:#1a1a1a;font-weight:500}
.tab.active::after{content:’’;position:absolute;bottom:0;left:13px;right:13px;height:2px;background:#5a8a3c;border-radius:1px}
.tc{display:none;padding:10px 12px 14px}
.tc.active{display:block}

/* ─── Control rows ─── */
.cr{background:#f7f5f1;border-radius:12px;padding:12px 13px;display:flex;align-items:center;margin-bottom:8px;gap:10px}
.cl{font-size:15px;color:#1a1a1a;min-width:62px;flex-shrink:0}
.cv{font-size:15px;color:#666;margin-left:auto;min-width:30px;text-align:right;flex-shrink:0}
.sel{flex:1;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:6px}
.selv{font-size:15px;color:#1a1a1a}
.sela{color:#999;font-size:12px}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
.swatch{width:28px;height:28px;border-radius:6px;border:1px solid #ddd;cursor:pointer;flex-shrink:0}
input[type=color]{position:absolute;opacity:0;width:0;height:0}
.split{display:flex;gap:8px;margin-bottom:8px}
.split .cr{flex:1;margin-bottom:0}
.btn-rnd{background:#f7f5f1;border:none;border-radius:12px;padding:12px 13px;font-size:15px;color:#1a1a1a;cursor:pointer;font-family:inherit;text-align:center;flex:1}
.btn-rnd:active{background:#ece9e3}

/* char input row */
.char-input{flex:1;border:none;background:transparent;font-size:16px;font-family:inherit;color:#1a1a1a;outline:none}

/* text inputs (gridA) */
.trow{background:#f7f5f1;border-radius:12px;padding:11px 13px;display:flex;align-items:center;margin-bottom:8px;gap:10px}
.trow input[type=text],.trow textarea{flex:1;border:none;background:transparent;font-size:14px;font-family:inherit;color:#1a1a1a;outline:none;resize:none}
.trow textarea{line-height:1.5;min-height:56px}
.stitle{font-size:11px;color:#999;font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:8px 13px 3px}

/* ─── Slots ─── */
.gslots{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px}
.gslot{aspect-ratio:1;background:#f0ece4;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border:1.5px dashed #ccc}
.gslot.filled{border-color:transparent}
.gslot img{width:100%;height:100%;object-fit:cover;display:block}
.snum{position:absolute;bottom:3px;left:5px;font-size:10px;color:rgba(255,255,255,.9);text-shadow:0 1px 2px rgba(0,0,0,.5);font-weight:600}
.srm{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;z-index:2}
.splus{font-size:20px;color:#bbb}
.sidx{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:9px;color:#bbb}
.slbl{position:absolute;inset:0;cursor:pointer;z-index:1}
.slbl input[type=file]{display:none}

/* ─── Dropdown ─── */
.dov{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center}
.dov.open{display:flex}
.dbk{position:absolute;inset:0;background:rgba(0,0,0,.15)}
.dsh{position:relative;background:#fff;border-radius:16px;margin:16px;width:calc(100% - 32px);max-width:420px;overflow:hidden;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.di{padding:15px 18px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0}
.di:last-child{border-bottom:none}
.di:active{background:#f7f7f7}
.di .ck{color:#5a8a3c;font-size:16px;width:20px}
</style>

</head>

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════
const S = {
  mode:'dots',
  mainImg:null, bgImg:null,
  layout:{arr:'top', ratio:50},
  bg:{type:'solid', c1:'#e8e3d8', c2:'#c8c0b0', strW:14},
  dots:{shape:'circle', color:'#5a8a3c', size:28, variance:0, count:18, dist:'random', pos:[], char:'●'},
  ga:{imgs:new Array(9).fill(null), title:'', captions:'', credit:'', bg:'#f5f2ec', txt:'#1a1a1a', gap:6, rad:0},
  gb:{imgs:new Array(9).fill(null), bg:'#f0ece4', txt:'#1a1a1a', scale:'medium', seed:42}
};

const cv = document.getElementById('mc');
const ctx = cv.getContext('2d');
const ca  = document.getElementById('ca');
const hint= document.getElementById('hint');

function sz(){ return {w:ca.clientWidth, h:ca.clientHeight}; }
function render(){ if(S.mode==='dots')rDots(); else if(S.mode==='gridA')rGA(); else rGB(); }

// ════════════════════════════════
//  CANVAS CLICK → upload or tap-place
// ════════════════════════════════
ca.addEventListener('click', e=>{
  if(S.mode==='dots' && (S.dots.dist==='tapL'||S.dots.dist==='tapS')){
    // tap to place dot
    const rect=cv.getBoundingClientRect();
    const scaleX=cv.width/(cv.style.width?parseInt(cv.style.width):cv.width);
    const scaleY=cv.height/(cv.style.height?parseInt(cv.style.height):cv.height);
    const rx=(e.clientX-rect.left)/rect.width;
    const ry=(e.clientY-rect.top)/rect.height;
    if(S.dots.dist==='tapL'){
      // asymmetric: just place
      S.dots.pos.push({x:rx,y:ry});
    } else {
      // symmetric: place + mirror
      S.dots.pos.push({x:rx,y:ry});
      S.dots.pos.push({x:1-rx,y:ry});
    }
    render(); return;
  }
  // otherwise open upload
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.multiple=(S.mode!=='dots');
  inp.onchange=e2=>handleFiles(e2.target.files);
  inp.click();
});

function handleFiles(files){
  if(!files||!files.length) return;
  if(S.mode==='dots'){
    readImg(files[0], img=>{ S.mainImg=img; render(); });
  } else {
    // find first empty slots
    const g=S.mode;
    const arr=S[g].imgs;
    let si=0;
    Array.from(files).slice(0,9).forEach(f=>{
      while(si<9 && arr[si]!==null) si++;
      if(si>=9) return;
      const idx=si; si++;
      readImg(f, img=>{ S[g].imgs[idx]=img; buildSlots(g); render(); });
    });
  }
}

function readImg(f,cb){
  const r=new FileReader();
  r.onload=e=>{ const img=new Image(); img.onload=()=>cb(img); img.src=e.target.result; };
  r.readAsDataURL(f);
}

// ════════════════════════════════
//  HEADER UPLOAD
// ════════════════════════════════
document.getElementById('hdrFile').addEventListener('change',e=>{ handleFiles(e.target.files); e.target.value=''; });

// BG photo
document.getElementById('bgPhotoFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  readImg(f, img=>{ S.bgImg=img; render(); });
  e.target.value='';
});

// ════════════════════════════════
//  DOTS RENDER  — FIX#1: mask shape (cutout from solid color overlay)
// ════════════════════════════════
function genPos(){
  const{w,h}=sz(), n=S.dots.count, pos=[];
  if(S.dots.dist==='random'){
    for(let i=0;i<n;i++) pos.push({x:Math.random(),y:Math.random()});
  } else if(S.dots.dist==='grid'){
    const cols=Math.ceil(Math.sqrt(n*(w/h))), rows=Math.ceil(n/cols); let c=0;
    for(let r=0;r<rows&&c<n;r++) for(let cl=0;cl<cols&&c<n;cl++,c++)
      pos.push({x:(cl+.5)/cols+(Math.random()-.5)*.04, y:(r+.5)/rows+(Math.random()-.5)*.04});
  }
  // tap modes keep pos as-is (user places manually)
  S.dots.pos=pos;
}

function makeShapePath(c2,shape,cx,cy,r,char){
  c2.beginPath();
  if(shape==='circle'){ c2.arc(cx,cy,r,0,Math.PI*2); }
  else if(shape==='square'){ c2.rect(cx-r,cy-r,r*2,r*2); }
  else if(shape==='star'){
    let rot=(Math.PI/2)*3,step=Math.PI/5;
    c2.moveTo(cx,cy-r);
    for(let i=0;i<5;i++){ c2.lineTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r); rot+=step; c2.lineTo(cx+Math.cos(rot)*(r*.4),cy+Math.sin(rot)*(r*.4)); rot+=step; }
    c2.closePath();
  } else if(shape==='drop'){
    c2.arc(cx,cy-r*.3,r*.7,Math.PI,0);
    c2.bezierCurveTo(cx+r*.7,cy+r*.2,cx+r*.3,cy+r,cx,cy+r);
    c2.bezierCurveTo(cx-r*.3,cy+r,cx-r*.7,cy+r*.2,cx-r*.7,cy-r*.3);
    c2.closePath();
  } else if(shape==='snowflake'){
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2,bl=r*.4;
      c2.moveTo(cx,cy); c2.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      const bx=cx+Math.cos(a)*r*.5,by=cy+Math.sin(a)*r*.5;
      c2.moveTo(bx,by); c2.lineTo(bx+Math.cos(a+Math.PI/6)*bl,by+Math.sin(a+Math.PI/6)*bl);
      c2.moveTo(bx,by); c2.lineTo(bx+Math.cos(a-Math.PI/6)*bl,by+Math.sin(a-Math.PI/6)*bl);
    }
  }
}

function coverDraw(c2,img,x,y,w,h,r=0){
  if(!img)return;
  const ar=img.naturalWidth/img.naturalHeight,bar=w/h;
  let sx=0,sy=0,sw=img.naturalWidth,sh=img.naturalHeight;
  if(ar>bar){sw=img.naturalHeight*bar;sx=(img.naturalWidth-sw)/2;}
  else{sh=img.naturalWidth/bar;sy=(img.naturalHeight-sh)/2;}
  if(r>0){ c2.save(); c2.beginPath(); rrect(c2,x,y,w,h,r); c2.clip(); }
  c2.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  if(r>0) c2.restore();
}

function rrect(c2,x,y,w,h,r){
  c2.moveTo(x+r,y); c2.lineTo(x+w-r,y); c2.arcTo(x+w,y,x+w,y+r,r);
  c2.lineTo(x+w,y+h-r); c2.arcTo(x+w,y+h,x+w-r,y+h,r);
  c2.lineTo(x+r,y+h); c2.arcTo(x,y+h,x,y+h-r,r);
  c2.lineTo(x,y+r); c2.arcTo(x,y,x+r,y,r);
}

function drawBg(c2,w,h){
  if(S.bg.type==='solid'){ c2.fillStyle=S.bg.c1; c2.fillRect(0,0,w,h); }
  else if(S.bg.type==='stripe'){
    c2.fillStyle=S.bg.c1; c2.fillRect(0,0,w,h);
    c2.fillStyle=S.bg.c2;
    const sw=S.bg.strW;
    for(let x=-h;x<w+h;x+=sw*2) c2.fillRect(x,0,sw,h);
  } else if(S.bg.type==='photo'&&S.bgImg){ c2.drawImage(S.bgImg,0,0,w,h); }
  else{ c2.fillStyle=S.bg.c1; c2.fillRect(0,0,w,h); }
}

function rDots(){
  ctx.setTransform(1,0,0,1,0,0);
  cv.style.width=''; cv.style.height='';
  const{w,h}=sz();
  cv.width=w; cv.height=h;
  hint.style.display=S.mainImg?'none':'flex';

  const arr=S.layout.arr, ratio=S.layout.ratio/100;
  let ix=0,iy=0,iw=w,ih=h;
  if(arr==='top') ih=h*ratio;
  else if(arr==='bottom'){iy=h*(1-ratio);ih=h*ratio;}
  else if(arr==='left') iw=w*ratio;
  else if(arr==='right'){ix=w*(1-ratio);iw=w*ratio;}

  // FIX#1: draw photo first, then draw colored overlay with shape cutouts
  // Left/top side: photo; right/bottom side: bg with cutouts showing photo
  // Actually: draw bg everywhere, then photo in main area, then overlay bg on secondary area with shape masks cut out

  // Step 1: draw bg (full canvas)
  drawBg(ctx,w,h);

  // Step 2: draw photo in primary area
  if(S.mainImg) coverDraw(ctx,S.mainImg,ix,iy,iw,ih);

  // Step 3: draw secondary area = bg color with shape holes revealing photo beneath
  // secondary area
  let sx2=0,sy2=0,sw2=w,sh2=h;
  if(arr==='top'){sy2=ih;sh2=h-ih;}
  else if(arr==='bottom'){sh2=iy;}
  else if(arr==='left'){sx2=iw;sw2=w-iw;}
  else if(arr==='right'){sw2=ix;}

  // Draw dots as mask cutouts: use 'destination-out' on a temp canvas
  // OR: draw overlay rect, then use clip for each dot shape

  // Approach: for each dot draw the photo-revealing hole
  const baseR=S.dots.size/2, vari=S.dots.variance/100;

  if(S.mainImg){
    // Re-draw photo as full canvas (hidden under overlay)
    // Draw the full photo scaled to cover full canvas (for the dot-reveal effect)
    // We need photo displayed in both halves for the cutout effect

    // Overlay: draw color over secondary region
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx2,sy2,sw2,sh2);
    ctx.clip();

    // fill secondary with bg color (opaque)
    drawBg(ctx,w,h);

    // now cut holes using composite
    ctx.globalCompositeOperation='destination-out';
    for(const p of S.dots.pos){
      const r2=Math.max(2,baseR*(1+(Math.random()*2-1)*vari));
      const cx2=p.x*w, cy2=p.y*h;
      if(S.dots.shape==='snowflake'){
        ctx.strokeStyle='rgba(0,0,0,1)';
        ctx.lineWidth=r2*.22;
        for(let i=0;i<6;i++){
          const a=(i/6)*Math.PI*2,bl=r2*.4;
          ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+Math.cos(a)*r2,cy2+Math.sin(a)*r2);ctx.stroke();
          const bx=cx2+Math.cos(a)*r2*.5,by=cy2+Math.sin(a)*r2*.5;
          ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a+Math.PI/6)*bl,by+Math.sin(a+Math.PI/6)*bl);ctx.stroke();
          ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a-Math.PI/6)*bl,by+Math.sin(a-Math.PI/6)*bl);ctx.stroke();
        }
      } else if(S.dots.shape==='char'){
        ctx.font=`bold ${r2*1.8}px sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(0,0,0,1)';
        ctx.fillText(S.dots.char||'●',cx2,cy2);
      } else {
        makeShapePath(ctx,S.dots.shape,cx2,cy2,r2,S.dots.char);
        ctx.fillStyle='rgba(0,0,0,1)';
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation='destination-over';
    // draw photo behind the holes
    coverDraw(ctx,S.mainImg,0,0,w,h);
    ctx.restore();
    ctx.globalCompositeOperation='source-over';
  } else {
    // no photo: just draw colored dots
    for(const p of S.dots.pos){
      const r2=Math.max(2,baseR*(1+(Math.random()*2-1)*vari));
      const cx2=p.x*w, cy2=p.y*h;
      ctx.fillStyle=S.dots.color;
      if(S.dots.shape==='snowflake'){
        ctx.strokeStyle=S.dots.color; ctx.lineWidth=r2*.18;
        for(let i=0;i<6;i++){
          const a=(i/6)*Math.PI*2,bl=r2*.4;
          ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+Math.cos(a)*r2,cy2+Math.sin(a)*r2);ctx.stroke();
          const bx=cx2+Math.cos(a)*r2*.5,by=cy2+Math.sin(a)*r2*.5;
          ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a+Math.PI/6)*bl,by+Math.sin(a+Math.PI/6)*bl);ctx.stroke();
          ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a-Math.PI/6)*bl,by+Math.sin(a-Math.PI/6)*bl);ctx.stroke();
        }
      } else if(S.dots.shape==='char'){
        ctx.font=`bold ${r2*1.8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(S.dots.char||'●',cx2,cy2);
      } else {
        makeShapePath(ctx,S.dots.shape,cx2,cy2,r2,S.dots.char);
        ctx.fill();
      }
    }
  }
}

// ════════════════════════════════
//  GRID A RENDER
// ════════════════════════════════
function mixC(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  return '#'+[((n>>16)&0xff),(( n>>8)&0xff),(n&0xff)].map(x=>Math.min(255,x+Math.round(amt*255)).toString(16).padStart(2,'0')).join('');
}
function rGA(){
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const{w:vw,h:vh}=sz();
  const ASPECT=3/4.5; let cw=vw,ch=vh;
  if(cw/ch>ASPECT) cw=ch*ASPECT; else ch=cw/ASPECT;
  cw=Math.floor(cw); ch=Math.floor(ch);
  cv.width=cw*DPR; cv.height=ch*DPR;
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const GA=S.ga;
  hint.style.display=GA.imgs.some(Boolean)?'none':'flex';
  ctx.fillStyle=GA.bg; ctx.fillRect(0,0,cw,ch);
  const PAD=cw*0.055, GAP=GA.gap, RAD=GA.rad, fs=cw*0.033;
  const titleH=fs*2.2, labelH=fs*2;
  const caps=(GA.captions||'').split('\n').filter(l=>l.trim());
  const bottomH=caps.length>0?(caps.length*fs*1.55+fs*2.5):fs*1.5;
  const gridH=ch-PAD-titleH-PAD*0.4-3*labelH-PAD-bottomH;
  const cellH=(gridH-2*GAP)/3, cellW=(cw-2*PAD-2*GAP)/3;
  ctx.fillStyle=GA.txt;
  ctx.font=`${fs}px -apple-system,'Helvetica Neue',sans-serif`;
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  if(GA.title) ctx.fillText(GA.title,PAD,PAD+titleH*0.75);
  const startY=PAD+titleH+PAD*0.2;
  for(let i=0;i<9;i++){
    const col=i%3, row=Math.floor(i/3);
    const x=PAD+col*(cellW+GAP), y=startY+row*(cellH+GAP+labelH);
    if(GA.imgs[i]){ coverDraw(ctx,GA.imgs[i],x,y,cellW,cellH,RAD); }
    else{ ctx.fillStyle=mixC(GA.bg,0.06); ctx.beginPath(); rrect(ctx,x,y,cellW,cellH,RAD); ctx.fill(); }
    ctx.fillStyle=GA.txt;
    ctx.font=`${fs*0.85}px -apple-system,'Helvetica Neue',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(`(${i+1})`,x+cellW/2,y+cellH+labelH*0.72);
  }
  const bY=startY+3*(cellH+GAP+labelH)+PAD*0.2;
  ctx.textAlign='left'; ctx.font=`${fs*0.85}px -apple-system,'Helvetica Neue',sans-serif`; ctx.fillStyle=GA.txt;
  caps.forEach((l,i)=>ctx.fillText(l,PAD,bY+fs+i*(fs*1.55)));
  if(GA.credit){ ctx.textAlign='right'; ctx.font=`${fs*0.75}px -apple-system,'Helvetica Neue',sans-serif`; ctx.fillStyle=GA.txt+'88'; ctx.fillText(GA.credit,cw-PAD,ch-PAD*0.5); }
}

// ════════════════════════════════
//  GRID B RENDER
// ════════════════════════════════
function srand(seed){ let s=seed; return()=>{ s=(s*1664525+1013904223)&0xffffffff; return(s>>>0)/0xffffffff; }; }
const SPOS=[
  {nx:0.04,ny:0.03,ar:0.82},{nx:0.44,ny:0.00,ar:0.82},{nx:0.68,ny:0.13,ar:0.75},
  {nx:0.02,ny:0.33,ar:1.0},{nx:0.29,ny:0.26,ar:1.05},{nx:0.65,ny:0.30,ar:1.25},
  {nx:0.04,ny:0.60,ar:1.35},{nx:0.31,ny:0.63,ar:1.35},{nx:0.60,ny:0.57,ar:0.82}
];
function rGB(){
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const{w:vw,h:vh}=sz();
  const ASPECT=3/4; let cw=vw,ch=vh;
  if(cw/ch>ASPECT) cw=ch*ASPECT; else ch=cw/ASPECT;
  cw=Math.floor(cw); ch=Math.floor(ch);
  cv.width=cw*DPR; cv.height=ch*DPR;
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const GB=S.gb;
  hint.style.display=GB.imgs.some(Boolean)?'none':'flex';
  ctx.fillStyle=GB.bg; ctx.fillRect(0,0,cw,ch);
  const sm={small:0.20,medium:0.28,large:0.37};
  const base=sm[GB.scale]||0.28;
  const rand=srand(GB.seed*7919+13);
  for(let i=0;i<9;i++){
    const img=GB.imgs[i]; if(!img)continue;
    const p=SPOS[i];
    const jx=(rand()-.5)*0.03, jy=(rand()-.5)*0.03;
    const nx=Math.max(0,Math.min(p.nx+jx,0.88)), ny=Math.max(0,Math.min(p.ny+jy,0.85));
    const sc=base+(rand()-.5)*0.04;
    const iw=cw*sc, ih=iw/p.ar, ix=nx*cw, iy=ny*ch;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.10)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
    coverDraw(ctx,img,ix,iy,iw,ih,2); ctx.restore();
    const nf=cw*0.022;
    ctx.fillStyle=GB.txt; ctx.font=`${nf}px -apple-system,'Helvetica Neue',sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(`(${String(i+1).padStart(2,'0')})`,ix+2,iy+ih+nf*1.4);
  }
}

function buildSlots(g){
  const cont=document.getElementById(g==='gridA'?'gaSlots':'gbSlots');
  cont.innerHTML='';
  S[g].imgs.forEach((img,i)=>{
    const slot=document.createElement('div');
    slot.className='gslot'+(img?' filled':'');
    if(img){
      const el=document.createElement('img'); el.src=img.src; slot.appendChild(el);
      const sn=document.createElement('div'); sn.className='snum'; sn.textContent=i+1; slot.appendChild(sn);
      const rm=document.createElement('div'); rm.className='srm'; rm.textContent='×';
      rm.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();S[g].imgs[i]=null;buildSlots(g);render();});
      slot.appendChild(rm);
    } else {
      const pl=document.createElement('span'); pl.className='splus'; pl.textContent='+'; slot.appendChild(pl);
      const idx=document.createElement('div'); idx.className='sidx'; idx.textContent=i+1; slot.appendChild(idx);
    }
    // individual slot file input
    const lbl=document.createElement('label'); lbl.className='slbl';
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f)return;
      readImg(f,im=>{ S[g].imgs[i]=im; buildSlots(g); render(); });
      e.target.value='';
    });
    lbl.appendChild(inp); slot.appendChild(lbl);
    cont.appendChild(slot);
  });
}

// Dist — FIX#4
function updateDistUI(){
  const isTap=S.dots.dist==='tapL'||S.dots.dist==='tapS';
  document.getElementById('rndBtn').textContent=isTap?'清空点位':'随机一下';
  document.getElementById('undoRow').style.display=isTap?'flex':'none';
  document.getElementById('tapHint').style.display=isTap?'block':'none';
}
document.getElementById('distRow').addEventListener('click',()=>{
  const opts=[{v:'random',l:'随机'},{v:'grid',l:'网格'},{v:'tapL',l:'点一下图片（左右不对应）'},{v:'tapS',l:'点一下图片（左右对应）'}];
  openDD(opts,S.dots.dist,v=>{
    S.dots.dist=v; document.getElementById('distLbl').textContent=opts.find(o=>o.v===v).l;
    updateDistUI();
    if(v==='random'||v==='grid') genPos();
    else S.dots.pos=[];
    render();
  });
});

document.getElementById('rndBtn').addEventListener('click',()=>{
  if(S.dots.dist==='tapL'||S.dots.dist==='tapS'){ S.dots.pos=[]; render(); }
  else { genPos(); render(); }
});
document.getElementById('undoBtn').addEventListener('click',()=>{
  if(S.dots.dist==='tapS'&&S.dots.pos.length>=2) S.dots.pos.splice(-2);
  else if(S.dots.pos.length>=1) S.dots.pos.pop();
  render();
});

// GB scale
document.getElementById('gbScaleRow').addEventListener('click',()=>{
  const opts=[{v:'small',l:'小'},{v:'medium',l:'中等'},{v:'large',l:'大'}];
  openDD(opts,S.gb.scale,v=>{ S.gb.scale=v; document.getElementById('gbScaleLbl').textContent=opts.find(o=>o.v===v).l; });
});

// ════════════════════════════════
//  TEXT INPUTS (gridA)
// ════════════════════════════════
[['gaTitle','title'],['gaCaptions','captions'],['gaCredit','credit']].forEach(([id,key])=>{
  const el=document.getElementById(id); if(!el)return;
  el.addEventListener('input',()=>{ S.ga[key]=el.value; render(); });
});

// ════════════════════════════════
//  INIT
// ════════════════════════════════
genPos();
render();
window.addEventListener('resize',()=>{ if(S.mode==='dots')genPos(); render(); });
</script>
