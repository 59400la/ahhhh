<html lang="zh-CN">
<head>

<title>dooo0t？</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #f0ece4; height:100dvh; display:flex; flex-direction:column; overflow:hidden;
}

/* Header */
.header {
background:#fff; padding:10px 12px; display:flex; align-items:center;
justify-content:space-between; z-index:10; border-bottom:1px solid #e8e4dc;
gap:8px; flex-wrap:nowrap;
}
.header h1 { font-size:16px; font-weight:600; color:#1a1a1a; white-space:nowrap; flex-shrink:0; }
.mode-switcher { display:flex; background:#f0ece4; border-radius:20px; padding:3px; gap:2px; flex-shrink:0; }
.mode-btn {
border:none; background:transparent; font-size:12px; padding:5px 9px;
border-radius:16px; cursor:pointer; font-family:inherit; color:#888; white-space:nowrap; transition:all .18s;
}
.mode-btn.active { background:#fff; color:#1a1a1a; font-weight:500; box-shadow:0 1px 3px rgba(0,0,0,.12); }
.header-btns { display:flex; gap:6px; flex-shrink:0; }

/* Upload label styled as button */
.btn-upload-label, .btn-outline {
border:1.5px solid #ccc; background:#fff; color:#1a1a1a; font-size:14px;
padding:6px 13px; border-radius:20px; cursor:pointer; font-family:inherit;
white-space:nowrap; display:inline-flex; align-items:center; user-select:none;
}
.btn-upload-label:active, .btn-outline:active { background:#f5f5f5; }
.btn-upload-label input[type=file] { display:none; }

/* Canvas */
.canvas-area {
flex:1; background:#e8e3d8; display:flex; align-items:center; justify-content:center;
position:relative; overflow:hidden;
}
canvas#mainCanvas { display:block; max-width:100%; max-height:100%; }
.upload-hint {
position:absolute; border:2px dashed #bbb; border-radius:16px;
padding:24px 40px; color:#aaa; font-size:15px; pointer-events:none;
}

/* Panel */
.panel { background:#fff; border-top:1px solid #e8e4dc; overflow-y:auto; max-height:44vh; }
.mode-panel { display:none; }
.mode-panel.active { display:block; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid #eee; padding:0 12px; background:#fff; position:sticky; top:0; z-index:5; overflow-x:auto; }
.tab { padding:11px 13px; font-size:14px; color:#999; cursor:pointer; position:relative; border:none; background:none; font-family:inherit; white-space:nowrap; }
.tab.active { color:#1a1a1a; font-weight:500; }
.tab.active::after { content:’’; position:absolute; bottom:0; left:13px; right:13px; height:2px; background:#5a8a3c; border-radius:1px; }
.tab-content { display:none; padding:10px 12px 14px; }
.tab-content.active { display:block; }

/* Controls */
.control-row {
background:#f7f5f1; border-radius:12px; padding:12px 13px;
display:flex; align-items:center; margin-bottom:8px; gap:10px;
}
.control-label { font-size:15px; color:#1a1a1a; min-width:58px; flex-shrink:0; }
.control-value { font-size:15px; color:#666; margin-left:auto; min-width:28px; text-align:right; flex-shrink:0; }
.select-trigger { flex:1; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:6px; }
.select-current { font-size:15px; color:#1a1a1a; }
.select-arrow { color:#999; font-size:12px; }

input[type=range] { -webkit-appearance:none; flex:1; height:4px; border-radius:2px; outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.25); cursor:pointer; }

.color-swatch { width:28px; height:28px; border-radius:6px; border:1px solid #ddd; cursor:pointer; flex-shrink:0; }
input[type=color] { position:absolute; opacity:0; width:0; height:0; }

.control-row-split { display:flex; gap:8px; margin-bottom:8px; }
.control-row-split .control-row { flex:1; margin-bottom:0; }

.btn-random { background:#f7f5f1; border:none; border-radius:12px; padding:12px 13px; font-size:15px; color:#1a1a1a; cursor:pointer; font-family:inherit; text-align:center; flex:1; }
.btn-random:active { background:#ece9e3; }

/* Slot grid */
.grid-slots { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; padding:10px 12px; }
.grid-slot {
aspect-ratio:1; background:#f0ece4; border-radius:6px; display:flex;
align-items:center; justify-content:center; cursor:pointer; overflow:hidden;
position:relative; border:1.5px dashed #ccc; transition:border-color .15s;
}
.grid-slot.filled { border-color:transparent; }
.grid-slot img { width:100%; height:100%; object-fit:cover; display:block; }
.slot-num { position:absolute; bottom:3px; left:5px; font-size:10px; color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.5); font-weight:600; }
.slot-remove { position:absolute; top:3px; right:3px; width:18px; height:18px; background:rgba(0,0,0,.45); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; cursor:pointer; }
.slot-plus { font-size:20px; color:#bbb; }
.slot-idx { position:absolute; bottom:3px; left:0; right:0; text-align:center; font-size:9px; color:#bbb; }

/* Slot label (invisible file trigger) */
.slot-label { position:absolute; inset:0; cursor:pointer; }
.slot-label input[type=file] { display:none; }

/* Text inputs */
.text-input-row { background:#f7f5f1; border-radius:12px; padding:11px 13px; display:flex; align-items:center; margin-bottom:8px; gap:10px; }
.text-input-row input[type=text], .text-input-row textarea { flex:1; border:none; background:transparent; font-size:14px; font-family:inherit; color:#1a1a1a; outline:none; resize:none; }

.section-title { font-size:11px; color:#999; font-weight:500; letter-spacing:.5px; text-transform:uppercase; padding:8px 13px 3px; }

/* Dropdown */

.dropdown-overlay.open { display:flex; }
.dropdown-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.15); }
.dropdown-sheet { position:relative; background:#fff; border-radius:16px; margin:16px; width:calc(100% - 32px); max-width:420px; overflow:hidden; z-index:1; box-shadow:0 8px 32px rgba(0,0,0,.15); }

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const state = {
  mode: 'dots',
  mainImage: null, bgImage: null,
  layout:     { arrange:'top', ratio:50 },
  background: { type:'solid', color:'#e8e3d8', stripeColor:'#c8c0b0', stripeWidth:10 },
  dots:       { shape:'circle', size:28, variance:0, count:18, color:'#5a8a3c', dist:'random', positions:[], char:'●' },
  gridA:      { images:new Array(9).fill(null), title:'', captions:'', credit:'', bgColor:'#f5f2ec', textColor:'#1a1a1a', gap:6, radius:0 },
  gridB:      { images:new Array(9).fill(null), bgColor:'#f0ece4', textColor:'#1a1a1a', scale:'medium', seed:42 }
};

const canvas     = document.getElementById('mainCanvas');
const ctx        = canvas.getContext('2d');
const canvasArea = document.getElementById('canvasArea');
const uploadHint = document.getElementById('uploadHint');

function getSize(){ return { w:canvasArea.clientWidth, h:canvasArea.clientHeight }; }
function render(){ if(state.mode==='dots')renderDots(); else if(state.mode==='gridA')renderGridA(); else renderGridB(); }

// ══════════════════════════════════════════
//  DOTS
// ══════════════════════════════════════════
function generateDotPositions(){
  const{w,h}=getSize(), n=state.dots.count, pos=[];
  if(state.dots.dist==='random'){
    for(let i=0;i<n;i++) pos.push({x:Math.random(),y:Math.random()});
  } else if(state.dots.dist==='grid'){
    const cols=Math.ceil(Math.sqrt(n*(w/h))), rows=Math.ceil(n/cols); let c=0;
    for(let r=0;r<rows&&c<n;r++) for(let cl=0;cl<cols&&c<n;cl++,c++)
      pos.push({x:(cl+.5)/cols+(Math.random()-.5)*.05, y:(r+.5)/rows+(Math.random()-.5)*.05});
  } else {
    for(let i=0;i<n;i++){
      let best=null,bd=-1;
      for(let t=0;t<20;t++){
        const p={x:Math.random(),y:Math.random()};
        let m=Infinity; for(const q of pos){const d=Math.hypot(p.x-q.x,p.y-q.y);if(d<m)m=d;}
        if(m>bd){bd=m;best=p;}
      }
      pos.push(best||{x:Math.random(),y:Math.random()});
    }
  }
  state.dots.positions=pos;
}

function drawDotShape(c2,shape,cx,cy,r,ch2){
  c2.beginPath();
  if(shape==='circle'){ c2.arc(cx,cy,r,0,Math.PI*2); c2.fill(); }
  else if(shape==='square'){ c2.rect(cx-r,cy-r,r*2,r*2); c2.fill(); }
  else if(shape==='star'){
    let rot=(Math.PI/2)*3, step=Math.PI/5;
    c2.moveTo(cx,cy-r);
    for(let i=0;i<5;i++){ c2.lineTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r); rot+=step; c2.lineTo(cx+Math.cos(rot)*(r*.4),cy+Math.sin(rot)*(r*.4)); rot+=step; }
    c2.closePath(); c2.fill();
  } else if(shape==='drop'){
    c2.arc(cx,cy-r*.3,r*.7,Math.PI,0);
    c2.bezierCurveTo(cx+r*.7,cy+r*.2,cx+r*.3,cy+r,cx,cy+r);
    c2.bezierCurveTo(cx-r*.3,cy+r,cx-r*.7,cy+r*.2,cx-r*.7,cy-r*.3);
    c2.closePath(); c2.fill();
  } else if(shape==='snowflake'){
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2, bl=r*.4;
      c2.moveTo(cx,cy); c2.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      const bx=cx+Math.cos(a)*r*.5, by=cy+Math.sin(a)*r*.5;
      c2.moveTo(bx,by); c2.lineTo(bx+Math.cos(a+Math.PI/6)*bl,by+Math.sin(a+Math.PI/6)*bl);
      c2.moveTo(bx,by); c2.lineTo(bx+Math.cos(a-Math.PI/6)*bl,by+Math.sin(a-Math.PI/6)*bl);
    }
    c2.strokeStyle=c2.fillStyle; c2.lineWidth=r*.18; c2.stroke();
  } else if(shape==='char'){
    c2.font=`${r*1.8}px sans-serif`; c2.textAlign='center'; c2.textBaseline='middle'; c2.fillText(ch2||'●',cx,cy);
  }
}

function drawBg(c2,w,h){
  const bg=state.background;
  if(bg.type==='solid'){ c2.fillStyle=bg.color; c2.fillRect(0,0,w,h); }
  else if(bg.type==='stripe'){
    c2.fillStyle=bg.color; c2.fillRect(0,0,w,h);
    c2.fillStyle=bg.stripeColor;
    for(let x=-h;x<w+h;x+=bg.stripeWidth*2) c2.fillRect(x,0,bg.stripeWidth,h);
  } else if(bg.type==='photo'&&state.bgImage){ c2.drawImage(state.bgImage,0,0,w,h); }
  else { c2.fillStyle=bg.color; c2.fillRect(0,0,w,h); }
}

function coverDraw(c2,img,x,y,w,h,r=0){
  if(!img)return;
  const ar=img.naturalWidth/img.naturalHeight, bar=w/h;
  let sx=0,sy=0,sw=img.naturalWidth,sh=img.naturalHeight;
  if(ar>bar){sw=img.naturalHeight*bar;sx=(img.naturalWidth-sw)/2;}
  else{sh=img.naturalWidth/bar;sy=(img.naturalHeight-sh)/2;}
  if(r>0){ c2.save(); c2.beginPath(); rrect(c2,x,y,w,h,r); c2.clip(); }
  c2.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  if(r>0) c2.restore();
}

function rrect(c2,x,y,w,h,r){
  c2.moveTo(x+r,y); c2.lineTo(x+w-r,y); c2.arcTo(x+w,y,x+w,y+r,r);
  c2.lineTo(x+w,y+h-r); c2.arcTo(x+w,y+h,x+w-r,y+h,r);
  c2.lineTo(x+r,y+h); c2.arcTo(x,y+h,x,y+h-r,r);
  c2.lineTo(x,y+r); c2.arcTo(x,y,x+r,y,r);
}

function renderDots(){
  ctx.setTransform(1,0,0,1,0,0);
  canvas.style.width=''; canvas.style.height='';
  const{w,h}=getSize();
  canvas.width=w; canvas.height=h;
  uploadHint.style.display=state.mainImage?'none':'flex';
  drawBg(ctx,w,h);
  if(state.mainImage){
    const arr=state.layout.arrange, ratio=state.layout.ratio/100;
    let ix=0,iy=0,iw=w,ih=h;
    if(arr==='top') ih=h*ratio;
    else if(arr==='bottom'){iy=h*(1-ratio);ih=h*ratio;}
    else if(arr==='left') iw=w*ratio;
    else if(arr==='right'){ix=w*(1-ratio);iw=w*ratio;}
    coverDraw(ctx,state.mainImage,ix,iy,iw,ih);
  }
  const baseR=state.dots.size/2, vari=state.dots.variance/100;
  for(const p of state.dots.positions){
    const r=baseR*(1+(Math.random()*2-1)*vari);
    ctx.fillStyle=state.dots.color;
    drawDotShape(ctx,state.dots.shape,p.x*w,p.y*h,Math.max(2,r),state.dots.char);
  }
}

// ══════════════════════════════════════════
//  GRID A
// ══════════════════════════════════════════
function mixColor(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((n>>16)&0xff)+Math.round(amt*255));
  const g=Math.min(255,((n>>8)&0xff)+Math.round(amt*255));
  const b=Math.min(255,(n&0xff)+Math.round(amt*255));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function renderGridA(){
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const{w:vw,h:vh}=getSize();
  const ASPECT=3/4.5;
  let cw=vw,ch=vh;
  if(cw/ch>ASPECT) cw=ch*ASPECT; else ch=cw/ASPECT;
  cw=Math.floor(cw); ch=Math.floor(ch);
  canvas.width=cw*DPR; canvas.height=ch*DPR;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);

  const GA=state.gridA;
  uploadHint.style.display=GA.images.some(Boolean)?'none':'flex';
  ctx.fillStyle=GA.bgColor; ctx.fillRect(0,0,cw,ch);

  const PAD=cw*0.055, GAP=GA.gap, RADIUS=GA.radius, fs=cw*0.033;
  const titleH=fs*2.2, labelH=fs*2;
  const captions=(GA.captions||'').split('\n').filter(l=>l.trim());
  const bottomH=captions.length>0?(captions.length*fs*1.55+fs*2.5):fs*1.5;
  const gridH=ch-PAD-titleH-PAD*0.4-3*labelH-PAD-bottomH;
  const cellH=(gridH-2*GAP)/3, cellW=(cw-2*PAD-2*GAP)/3;

  ctx.fillStyle=GA.textColor;
  ctx.font=`${fs}px -apple-system,'Helvetica Neue',sans-serif`;
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  if(GA.title) ctx.fillText(GA.title,PAD,PAD+titleH*0.75);

  const startY=PAD+titleH+PAD*0.2;
  for(let i=0;i<9;i++){
    const col=i%3, row=Math.floor(i/3);
    const x=PAD+col*(cellW+GAP), y=startY+row*(cellH+GAP+labelH);
    if(GA.images[i]){
      coverDraw(ctx,GA.images[i],x,y,cellW,cellH,RADIUS);
    } else {
      ctx.fillStyle=mixColor(GA.bgColor,0.06);
      ctx.beginPath(); rrect(ctx,x,y,cellW,cellH,RADIUS); ctx.fill();
    }
    ctx.fillStyle=GA.textColor;
    ctx.font=`${fs*0.85}px -apple-system,'Helvetica Neue',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(`(${i+1})`,x+cellW/2,y+cellH+labelH*0.72);
  }

  const bottomY=startY+3*(cellH+GAP+labelH)+PAD*0.2;
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.font=`${fs*0.85}px -apple-system,'Helvetica Neue',sans-serif`;
  ctx.fillStyle=GA.textColor;
  captions.forEach((line,i)=>ctx.fillText(line,PAD,bottomY+fs+i*(fs*1.55)));
  if(GA.credit){
    ctx.textAlign='right';
    ctx.font=`${fs*0.75}px -apple-system,'Helvetica Neue',sans-serif`;
    ctx.fillStyle=GA.textColor+'88';
    ctx.fillText(GA.credit,cw-PAD,ch-PAD*0.5);
  }
}

// ══════════════════════════════════════════
//  GRID B
// ══════════════════════════════════════════
function srand(seed){
  let s=seed;
  return()=>{s=(s*1664525+1013904223)&0xffffffff; return(s>>>0)/0xffffffff;};
}
const SCATTER_POS=[
  {nx:0.04,ny:0.03,ar:0.82},{nx:0.44,ny:0.00,ar:0.82},{nx:0.68,ny:0.13,ar:0.75},
  {nx:0.02,ny:0.33,ar:1.0 },{nx:0.29,ny:0.26,ar:1.05},{nx:0.65,ny:0.30,ar:1.25},
  {nx:0.04,ny:0.60,ar:1.35},{nx:0.31,ny:0.63,ar:1.35},{nx:0.60,ny:0.57,ar:0.82},
];
function renderGridB(){
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const{w:vw,h:vh}=getSize();
  const ASPECT=3/4;
  let cw=vw,ch=vh;
  if(cw/ch>ASPECT) cw=ch*ASPECT; else ch=cw/ASPECT;
  cw=Math.floor(cw); ch=Math.floor(ch);
  canvas.width=cw*DPR; canvas.height=ch*DPR;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const GB=state.gridB;
  uploadHint.style.display=GB.images.some(Boolean)?'none':'flex';
  ctx.fillStyle=GB.bgColor; ctx.fillRect(0,0,cw,ch);
  const scaleMap={small:0.20,medium:0.28,large:0.37};
  const base=scaleMap[GB.scale]||0.28;
  const rand=srand(GB.seed*7919+13);
  for(let i=0;i<9;i++){
    const img=GB.images[i]; if(!img)continue;
    const p=SCATTER_POS[i];
    const jx=(rand()-.5)*0.03, jy=(rand()-.5)*0.03;
    const nx=Math.max(0,Math.min(p.nx+jx,0.88));
    const ny=Math.max(0,Math.min(p.ny+jy,0.85));
    const sc=base+(rand()-.5)*0.04;
    const iw=cw*sc, ih=iw/p.ar, ix=nx*cw, iy=ny*ch;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.10)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
    coverDraw(ctx,img,ix,iy,iw,ih,2);
    ctx.restore();
    const numFs=cw*0.022;
    ctx.fillStyle=GB.textColor;
    ctx.font=`${numFs}px -apple-system,'Helvetica Neue',sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(`(${String(i+1).padStart(2,'0')})`,ix+2,iy+ih+numFs*1.4);
  }
}

// ══════════════════════════════════════════
//  SLOTS UI — each slot has its OWN <label><input>
// ══════════════════════════════════════════
function buildSlots(g){
  const cont=document.getElementById(`${g}-slots`);
  cont.innerHTML='';
  state[g].images.forEach((img,i)=>{
    const slot=document.createElement('div');
    slot.className='grid-slot'+(img?' filled':'');

    if(img){
      const el=document.createElement('img'); el.src=img.src; slot.appendChild(el);
      const num=document.createElement('div'); num.className='slot-num'; num.textContent=i+1; slot.appendChild(num);
      const rm=document.createElement('div'); rm.className='slot-remove'; rm.textContent='×';
      rm.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();state[g].images[i]=null;buildSlots(g);render();});
      slot.appendChild(rm);
    } else {
      const pl=document.createElement('span'); pl.className='slot-plus'; pl.textContent='+'; slot.appendChild(pl);
      const idx=document.createElement('div'); idx.className='slot-idx'; idx.textContent=i+1; slot.appendChild(idx);
    }

    // Each slot wraps its own file input via <label>
    const lbl=document.createElement('label');
    lbl.className='slot-label';
    lbl.title='点击上传照片';
    const inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        const image=new Image();
        image.onload=()=>{ state[g].images[i]=image; buildSlots(g); render(); };
        image.src=ev.target.result;
      };
      reader.readAsDataURL(f);
      e.target.value='';
    });
    lbl.appendChild(inp);
    slot.appendChild(lbl);
    cont.appendChild(slot);
  });
}
buildSlots('gridA');
buildSlots('gridB');

document.getElementById('gridA-clearBtn').addEventListener('click',()=>{state.gridA.images=new Array(9).fill(null);buildSlots('gridA');render();});
document.getElementById('gridB-clearBtn').addEventListener('click',()=>{state.gridB.images=new Array(9).fill(null);buildSlots('gridB');render();});

// ══════════════════════════════════════════
//  MAIN UPLOAD (header button = label)
//  switches based on current mode
// ══════════════════════════════════════════
const uploadLabel = document.getElementById('uploadLabel');
const fileInput   = document.getElementById('fileInput');

// When mode changes, update what the header upload label accepts
function updateUploadLabel(){
  if(state.mode==='dots'){
    fileInput.accept='image/*,video/*';
  } else {
    fileInput.accept='image/*';
  }
}

fileInput.addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  if(state.mode!=='dots'){ e.target.value=''; return; } // shouldn't happen but guard
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ state.mainImage=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
  e.target.value='';
});

// BG photo upload
document.getElementById('bgFileInput').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{ state.bgImage=img; render(); };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
  e.target.value='';
});

// ══════════════════════════════════════════
//  DOWNLOAD — use toBlob + object URL
// ══════════════════════════════════════════
document.getElementById('downloadBtn').addEventListener('click',()=>{
  canvas.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='dooo0t.png';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
});

// ══════════════════════════════════════════
//  MODE SWITCH
// ══════════════════════════════════════════
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode=btn.dataset.mode;
    document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+state.mode).classList.add('active');
    if(state.mode==='dots'){ ctx.setTransform(1,0,0,1,0,0); canvas.style.width=''; canvas.style.height=''; }
    updateUploadLabel();
    render();
  });
});

//  INNER TABS
// ══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    const panel=tab.dataset.panel, tabId=tab.dataset.tab;
    document.querySelectorAll(`#panel-${panel} .tab`).forEach(t=>t.classList.remove('active'));
    document.querySelectorAll(`#panel-${panel} .tab-content`).forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`${panel}-tab-${tabId}`).classList.add('active');
  });
});

// ══════════════════════════════════════════
//  DROPDOWN
// ══════════════════════════════════════════
const overlay=document.getElementById('dropdownOverlay'), sheet=document.getElementById('dropdownSheet');
function openDropdown(options,cur,onSelect){
  sheet.innerHTML='';
  options.forEach(opt=>{
    const item=document.createElement('div'); item.className='dropdown-item';
    item.innerHTML=`<span class="check">${opt.value===cur?'✓':''}</span><span>${opt.label}</span>`;
    item.addEventListener('click',()=>{ onSelect(opt.value); closeDropdown(); render(); });
    sheet.appendChild(item);
  });
  overlay.classList.add('open');
}
function closeDropdown(){ overlay.classList.remove('open'); }
document.getElementById('dropdownBackdrop').addEventListener('click',closeDropdown);

document.getElementById('layoutArrangeRow').addEventListener('click',()=>{
  const opts=[{value:'left',label:'主图在左'},{value:'right',label:'主图在右'},{value:'top',label:'主图在上'},{value:'bottom',label:'主图在下'}];
  openDropdown(opts,state.layout.arrange,v=>{state.layout.arrange=v;document.getElementById('layoutArrangeLabel').textContent=opts.find(o=>o.value===v).label;});
});
document.getElementById('bgTypeRow').addEventListener('click',()=>{
  const opts=[{value:'solid',label:'纯色'},{value:'stripe',label:'条纹'},{value:'photo',label:'照片'}];
  openDropdown(opts,state.background.type,v=>{
    state.background.type=v; document.getElementById('bgTypeLabel').textContent=opts.find(o=>o.value===v).label;
    document.getElementById('bgColorRow').style.display=v==='solid'?'flex':'none';
    document.getElementById('stripeControls').style.display=v==='stripe'?'block':'none';
    document.getElementById('bgPhotoControls').style.display=v==='photo'?'block':'none';
  });
});
document.getElementById('dotShapeRow').addEventListener('click',()=>{
  const opts=[{value:'circle',label:'圆形'},{value:'square',label:'方形'},{value:'star',label:'五角星形'},{value:'drop',label:'水滴形'},{value:'snowflake',label:'雪花形'},{value:'char',label:'字符形'}];
  openDropdown(opts,state.dots.shape,v=>{
    state.dots.shape=v; document.getElementById('dotShapeLabel').textContent=opts.find(o=>o.value===v).label;
    document.getElementById('charRow').style.display=v==='char'?'flex':'none';

});
document.getElementById('dotDistRow').addEventListener('click',()=>{
  const opts=[{value:'random',label:'随机'},{value:'grid',label:'网格'},{value:'scatter',label:'分散'}];
  openDropdown(opts,state.dots.dist,v=>{
    state.dots.dist=v; document.getElementById('dotDistLabel').textContent=opts.find(o=>o.value===v).label;
    generateDotPositions(); render();

document.getElementById('gridB-scaleRow').addEventListener('click',()=>{
  const opts=[{value:'small',label:'小'},{value:'medium',label:'中等'},{value:'large',label:'大'}];
  openDropdown(opts,state.gridB.scale,v=>{state.gridB.scale=v;document.getElementById('gridB-scaleLabel').textContent=opts.find(o=>o.value===v).label;});

// ══════════════════════════════════════════
//  SLIDERS
// ══════════════════════════════════════════
function setupSlider(id,valId,cb,min,max){
  const s=document.getElementById(id), v=document.getElementById(valId);
  if(!s)return;
  s.addEventListener('input',()=>{ const n=parseInt(s.value); if(v)v.textContent=n; updateSliderBg(s,min,max); cb(n); render(); });
}
function updateSliderBg(s,min,max){
  const p=((s.value-min)/(max-min)*100).toFixed(1);
  s.style.background=`linear-gradient(to right,#5a8a3c ${p}%,#ddd ${p}%)`;
}
setupSlider('layoutRatio','layoutRatioVal',v=>state.layout.ratio=v,10,90);
setupSlider('dotSize','dotSizeVal',v=>state.dots.size=v,4,80);
setupSlider('dotVariance','dotVarianceVal',v=>state.dots.variance=v,0,50);
setupSlider('dotCount','dotCountVal',v=>{state.dots.count=v;generateDotPositions();},3,50);
setupSlider('stripeWidth','stripeWidthVal',v=>state.background.stripeWidth=v,2,40);
setupSlider('gridA-gap','gridA-gapVal',v=>state.gridA.gap=v,0,20);
setupSlider('gridA-radius','gridA-radiusVal',v=>state.gridA.radius=v,0,20);
setupSlider('gridB-seed','gridB-seedVal',v=>state.gridB.seed=v,0,99);

// ══════════════════════════════════════════
//  COLORS
// ══════════════════════════════════════════
function bindColor(rowId,pickerId,swatchId,setter){
  document.getElementById(rowId).addEventListener('click',()=>document.getElementById(pickerId).click());
  document.getElementById(pickerId).addEventListener('input',e=>{ setter(e.target.value); if(swatchId)document.getElementById(swatchId).style.background=e.target.value; render(); });
}
bindColor('bgColorRow','bgColorPicker','bgColorSwatch',v=>state.background.color=v);
bindColor('stripeColorRow','stripeColorPicker','stripeColorSwatch',v=>state.background.stripeColor=v);
bindColor('dotColorRow','dotColorPicker2','dotColorSwatch',v=>state.dots.color=v);
bindColor('gridA-bgColorRow','collBgColorPicker','collBgColorSwatch',v=>state.gridA.bgColor=v);
bindColor('gridA-textColorRow','collTextColorPicker','collTextColorSwatch',v=>state.gridA.textColor=v);
bindColor('gridB-bgColorRow','gridB-bgColorPicker','gridBBgSwatch',v=>state.gridB.bgColor=v);
